<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Fit Dot Editor</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #eef2f5; padding: 20px; color: #333; margin: 0; height: 100vh; box-sizing: border-box; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 95vw; max-width: 1200px; display: flex; flex-direction: column; height: calc(100vh - 40px); }
        h2 { margin: 0 0 15px 0; color: #444; border-bottom: 2px solid #007bff; padding-bottom: 10px; text-align: center; font-size: 1.2rem; }
        
        /* 操作パネル：コンパクトに配置 */
        .controls { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 10px; 
            margin-bottom: 15px;
            background: #fafafa;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #eee;
            flex-shrink: 0;
        }
        .control-group { display: flex; flex-direction: column; gap: 3px; }
        label { font-weight: bold; font-size: 0.75rem; color: #666; }
        input[type="text"], input[type="file"], input[type="number"] { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.8rem; }
        
        .workspace { 
            display: flex; 
            gap: 15px; 
            flex-grow: 1; /* 余ったスペースをすべて使う */
            min-height: 0; /* 子要素のoverflowを機能させるために必要 */
        }
        
        /* キャンバス表示エリア：ここが重要 */
        .canvas-container { 
            flex-grow: 1; 
            border: 2px solid #ddd; 
            background: #444; 
            border-radius: 8px; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* はみ出しをカット（内部で縮小される） */
            position: relative;
        }
        
        canvas { 
            image-rendering: pixelated;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            cursor: crosshair;
            /* 画像を枠内に収める設定 */
            max-width: 100%; 
            max-height: 100%;
            object-fit: contain; 
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .palette-container { width: 100px; flex-shrink: 0; background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee; overflow-y: auto; }
        .palette { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .color-swatch { width: 100%; aspect-ratio: 1/1; border-radius: 4px; border: 2px solid transparent; cursor: pointer; }
        .color-swatch.active { border-color: #007bff; transform: scale(1.05); }
        .eraser-swatch { width: 100%; padding: 8px 0; background: #eee; border: 1px solid #ccc; font-size: 0.7rem; text-align: center; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .eraser-swatch.active { background: #ffebee; color: #ff4757; border-color: #ff4757; }

        .btn-save { flex-shrink: 0; width: 100%; margin-top: 10px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dot Art Editor (Fit Mode)</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>1. 画像を選択</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        <div class="control-group">
            <label>2. ドットの大きさ: <span id="sizeValue">10.0</span>px</label>
            <div style="display:flex; gap:5px;">
                <input type="range" id="dotSize" min="1.0" max="50.0" step="0.1" value="10.0" style="flex-grow:1;">
                <input type="number" id="dotSizeNum" min="1.0" max="50.0" step="0.1" value="10.0" style="width:55px;">
            </div>
        </div>
        <div class="control-group">
            <label>3. 保存名</label>
            <input type="text" id="fileName" value="dot_art">
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-container" id="container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="palette-container">
            <div style="font-weight:bold; font-size:0.75rem; margin-bottom:8px; text-align:center;">パレット</div>
            <div class="palette" id="palette"></div>
            <div class="eraser-swatch" id="eraser">消しゴム</div>
        </div>
    </div>

    <button id="downloadBtn" class="btn-save" disabled>画像を保存・ダウンロード（PNG形式）</button>
</div>

<script>
    const upload = document.getElementById('upload');
    const dotSizeInput = document.getElementById('dotSize');
    const dotSizeNumInput = document.getElementById('dotSizeNum');
    const sizeValue = document.getElementById('sizeValue');
    const fileNameInput = document.getElementById('fileName');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const paletteContainer = document.getElementById('palette');
    const eraserBtn = document.getElementById('eraser');
    const downloadBtn = document.getElementById('downloadBtn');

    let originalImage = null;
    let pixelData = []; 
    let gridWidth = 0;
    let gridHeight = 0;
    let isDrawing = false;
    let selectedColor = { r:0, g:0, b:0, a:255 };
    let selectedSwatch = null;

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        fileNameInput.value = file.name.split('.').slice(0, -1).join('.') + "_dot";
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImage = new Image();
            originalImage.onload = () => {
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                convertAndRender();
                downloadBtn.disabled = false;
            };
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    const updateDotSize = (val) => {
        val = Math.max(1.0, Math.min(50.0, parseFloat(val) || 1.0)).toFixed(1);
        sizeValue.innerText = val;
        dotSizeInput.value = val;
        dotSizeNumInput.value = val;
        if (originalImage) convertAndRender();
    };

    dotSizeInput.addEventListener('input', (e) => updateDotSize(e.target.value));
    dotSizeNumInput.addEventListener('change', (e) => updateDotSize(e.target.value));

    function convertAndRender() {
        const dotSize = parseFloat(dotSizeInput.value);
        ctx.drawImage(originalImage, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        gridWidth = Math.ceil(canvas.width / dotSize);
        gridHeight = Math.ceil(canvas.height / dotSize);
        pixelData = new Array(gridWidth * gridHeight);
        
        const colorsMap = new Map();
        for (let gy = 0; gy < gridHeight; gy++) {
            for (let gx = 0; gx < gridWidth; gx++) {
                const x = Math.floor(gx * dotSize);
                const y = Math.floor(gy * dotSize);
                const i = (y * canvas.width + x) * 4;
                if (i >= data.length) continue;
                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                pixelData[gy * gridWidth + gx] = [r, g, b, a];
                if (a > 10) colorsMap.set(`${r},${g},${b},${a}`, (colorsMap.get(`${r},${g},${b},${a}`) || 0) + 1);
            }
        }
        createPalette(colorsMap);
        drawPixels();
    }

    function drawPixels() {
        if (!pixelData.length) return;
        const dotSize = parseFloat(dotSizeInput.value);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let gy = 0; gy < gridHeight; gy++) {
            for (let gx = 0; gx < gridWidth; gx++) {
                const d = pixelData[gy * gridWidth + gx];
                if (!d || d[3] === 0) continue;
                ctx.fillStyle = `rgba(${d[0]},${d[1]},${d[2]},${d[3]/255})`;
                ctx.fillRect(gx * dotSize, gy * dotSize, dotSize + 0.5, dotSize + 0.5);
            }
        }
    }

    function createPalette(colorsMap) {
        const sorted = Array.from(colorsMap.entries()).sort((a,b) => b[1]-a[1]).slice(0, 14);
        paletteContainer.innerHTML = '';
        sorted.forEach(([key]) => {
            const [r,g,b,a] = key.split(',').map(Number);
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.backgroundColor = `rgba(${r},${g},${b},${a/255})`;
            swatch.onclick = () => {
                if (selectedSwatch) selectedSwatch.classList.remove('active');
                eraserBtn.classList.remove('active');
                selectedSwatch = swatch;
                swatch.classList.add('active');
                selectedColor = {r,g,b,a};
            };
            paletteContainer.appendChild(swatch);
        });
        if (paletteContainer.firstChild) paletteContainer.firstChild.click();
    }

    eraserBtn.onclick = () => {
        if (selectedSwatch) selectedSwatch.classList.remove('active');
        eraserBtn.classList.add('active');
        selectedColor = null;
    };

    const getCanvasPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        // CSSでの縮小表示を考慮した座標変換
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);
        return { x, y };
    };

    const handlePaint = (e) => {
        if (!isDrawing || !pixelData.length) return;
        const pos = getCanvasPos(e);
        const dotSize = parseFloat(dotSizeInput.value);
        const gx = Math.floor(pos.x / dotSize);
        const gy = Math.floor(pos.y / dotSize);

        if (gx >= 0 && gx < gridWidth && gy >= 0 && gy < gridHeight) {
            const idx = gy * gridWidth + gx;
            pixelData[idx] = selectedColor ? [selectedColor.r, selectedColor.g, selectedColor.b, selectedColor.a] : [0,0,0,0];
            drawPixels();
        }
    };

    canvas.onmousedown = (e) => { isDrawing = true; handlePaint(e); };
    window.onmousemove = handlePaint;
    window.onmouseup = () => isDrawing = false;
    canvas.ontouchstart = (e) => { isDrawing = true; handlePaint(e); e.preventDefault(); };
    window.ontouchmove = handlePaint;
    window.ontouchend = () => isDrawing = false;

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = (fileNameInput.value || 'dot_art') + ".png";
        link.href = canvas.toDataURL();
        link.click();
    };
</script>

</body>
</html>
