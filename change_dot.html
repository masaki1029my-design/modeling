<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Dot Art Converter</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #eef2f5; padding: 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 900px; width: 100%; }
        h2 { margin-top: 0; color: #444; border-bottom: 2px solid tomato; padding-bottom: 10px; }
        
        .controls { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 25px;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
        }
        
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 0.85rem; color: #666; }
        
        input[type="text"], input[type="file"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        canvas { 
            max-width: 100%; 
            height: auto; 
            border: 1px solid #ddd; 
            margin-top: 10px; 
            image-rendering: pixelated; /* ドットをくっきり表示 */
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .btn-save { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 12px 25px; 
            background: #28a745; 
            color: white; 
            border: none;
            border-radius: 6px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-save:hover { background: #218838; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>ドットイラスト　変換サイト</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>1. 変換する画像・イラスト</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        
        <div class="control-group">
            <label>2. ドットの大きさ (0.1単位): <span id="sizeValue">10.0</span>px</label>
            <input type="range" id="dotSize" min="1.0" max="50.0" step="0.1" value="10.0">
        </div>

        <div class="control-group">
            <label>3. 保存ファイル名</label>
            <input type="text" id="fileName" placeholder="dot_art" value="名前未設定">
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <br>
    <button id="downloadBtn" class="btn-save" disabled>名前を付けて画像を保存・ダウンロード（png形式）</button>
</div>

<script>
    const upload = document.getElementById('upload');
    const dotSizeInput = document.getElementById('dotSize');
    const sizeValue = document.getElementById('sizeValue');
    const fileNameInput = document.getElementById('fileName');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const downloadBtn = document.getElementById('downloadBtn');

    let originalImage = null;

    // 画像読み込み
    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // ファイル名入力欄に初期値をセット（拡張子抜き）
        const nameWithoutExt = file.name.split('.').slice(0, -1).join('.');
        fileNameInput.value = nameWithoutExt + "_dot";

        const reader = new FileReader();
        reader.onload = (event) => {
            originalImage = new Image();
            originalImage.onload = () => {
                render();
                downloadBtn.disabled = false;
            };
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // スライダー操作時
    dotSizeInput.addEventListener('input', () => {
        const val = parseFloat(dotSizeInput.value).toFixed(1);
        sizeValue.innerText = val;
        if (originalImage) render();
    });

    function render() {
        // floatとして取得
        const dotSize = parseFloat(dotSizeInput.value);
        
        canvas.width = originalImage.width;
        canvas.height = originalImage.height;

        // 元画像を一度描画してピクセルデータを抽出
        ctx.drawImage(originalImage, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ドット描画ループ
        // 小数点サイズに対応するため、ループのステップにdotSize（float）を使用
        for (let y = 0; y < canvas.height; y += dotSize) {
            for (let x = 0; x < canvas.width; x += dotSize) {
                // サンプリング位置を計算（整数のインデックスに変換）
                const posX = Math.floor(x);
                const posY = Math.floor(y);
                const i = (posY * canvas.width + posX) * 4;

                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];

                ctx.fillStyle = `rgba(${r},${g},${b},${a / 255})`;
                // 描画サイズもdotSizeに合わせる（隙間が出ないよう+0.2程度の補正を入れる場合もありますが、基本はそのままでOK）
                ctx.fillRect(x, y, dotSize, dotSize);
            }
        }
    }

    // 保存処理
    downloadBtn.addEventListener('click', () => {
        if (!canvas.width) return;

        const link = document.createElement('a');
        // 入力されたファイル名を取得（空ならデフォルト名）
        let name = fileNameInput.value.trim();
        if (!name) name = 'dot_art';
        
        link.download = `${name}.png`;
        link.href = canvas.toDataURL('image/png');
        
        // リンクをクリックさせて保存ダイアログを起動
        link.click();
    });
</script>

</body>
</html>
