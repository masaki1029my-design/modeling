<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Move and Stamina Game</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            max-width: 100%;
            max-height: 80vh;
        }
        .controls {
            display: none;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        #menuOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .menu-btn {
            padding: 15px 30px;
            margin: 10px;
            background: #333;
            border: 2px solid #fff;
            color: white;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            width: 200px;
            text-align: center;
        }
        .menu-btn:hover { background: #555; }

        #mobileDashBtn {
            display: none;
            position: fixed;
            left: 30px; bottom: 50px;
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            color: white; font-weight: bold;
            align-items: center; justify-content: center;
            user-select: none; z-index: 100;
        }
        #mobileMenuBtn {
            position: fixed;
            left: 20px; top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: white; border-radius: 5px;
            z-index: 100;
            display: flex;
        }
    </style>
</head>
<body>

    <div id="gameControls" class="controls">
        <strong>操作:</strong> WASD(移動) / Shift(ダッシュ) / F(調べる) / Space(メニュー)<br>
        <strong>モバイル:</strong> スワイプ移動 / DASHボタン / 対象を直接タップして調べる
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="mobileDashBtn">DASH</div>
    <div id="mobileMenuBtn">MENU</div>

    <div id="menuOverlay">
        <div class="menu-btn" id="resumeBtn">ゲームに戻る</div>
        <div class="menu-btn" id="backToTitleBtn">タイトルに戻る</div>
        <div class="menu-btn" id="exitToWorkBtn">作品サイトに戻る</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const dashBtn = document.getElementById('mobileDashBtn');
        const menuBtn = document.getElementById('mobileMenuBtn');
        const controlsDiv = document.getElementById('gameControls');
        const menuOverlay = document.getElementById('menuOverlay');
        const resumeBtn = document.getElementById('resumeBtn');
        const backToTitleBtn = document.getElementById('backToTitleBtn');
        const exitToWorkBtn = document.getElementById('exitToWorkBtn');

        const mapImg = new Image();
        mapImg.src = 'game_img/map00.png';

        let gameState = "title"; 
        let isMenuOpen = false;
        let titleFrame = 0;
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        const player = {
            x: 0, y: 0,
            width: 40, height: 60,
            baseSpeed: 1.8, dashSpeed: 3.5, currentSpeed: 1.8,
            color: '#4AF626', stamina: 100, maxStamina: 100,
            isRunning: false, isExhausted: false,
            barOpacity: 0, facingRight: true, walkCycle: 0
        };

        const item = {
            name: "紙きれ", x: 0, y: 0, size: 20,
            info: "【操作説明】WASDで移動、Shiftでダッシュ。Fで対象を調べる。"
        };

        const keys = { w: false, a: false, s: false, d: false, shift: false };
        const touch = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0, isDash: false };
        let message = "";

        function startGame() {
            if (gameState === "title" && !isMenuOpen) {
                gameState = "playing";
                controlsDiv.style.display = "block";
                if (isMobile) {
                    dashBtn.style.display = "flex";
                }
                resetPlayerPosition();
            }
        }

        function resetPlayerPosition() {
            if (mapImg.complete) {
                player.x = mapImg.width / 2 - player.width / 2;
                player.y = mapImg.height / 2 - player.height / 2;
                player.stamina = player.maxStamina;
                player.isExhausted = false;
            }
        }

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            menuOverlay.style.display = isMenuOpen ? "flex" : "none";
        }

        function backToTitle() {
            isMenuOpen = false;
            gameState = "title";
            menuOverlay.style.display = "none";
            controlsDiv.style.display = "none";
            dashBtn.style.display = "none";
            message = "";
        }

        resumeBtn.onclick = toggleMenu;
        backToTitleBtn.onclick = backToTitle;
        exitToWorkBtn.onclick = () => { window.location.href = 'work_03.html'; };
        menuBtn.onclick = toggleMenu;

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                toggleMenu();
                return;
            }
            if (isMenuOpen) return;
            if (gameState === "title") {
                startGame();
                return;
            }
            if (key === 'shift') keys.shift = true;
            if (key in keys) keys[key] = true;
            if (key === 'f') toggleMessage();
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'shift') keys.shift = false;
            if (key in keys) keys[key] = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isMenuOpen) return;
            if (gameState === "title") {
                startGame();
                return;
            }
            if (message !== "") { message = ""; return; }

            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = (t.clientX - rect.left) * (canvas.width / rect.width);
            const touchY = (t.clientY - rect.top) * (canvas.height / rect.height);

            // モバイル用：対象物（紙きれ）を直接タップしたか判定
            const camX = canvas.width / 2 - player.x - player.width / 2;
            const camY = canvas.height / 2 - player.y - player.height / 2;
            const itemScreenX = item.x + camX;
            const itemScreenY = item.y + camY;

            if (touchX >= itemScreenX && touchX <= itemScreenX + item.size &&
                touchY >= itemScreenY && touchY <= itemScreenY + item.size * 1.2) {
                checkInteraction(); // 接近判定を含めて実行
                if (message !== "") return;
            }

            // 移動開始処理
            touch.active = true;
            touch.startX = t.clientX; 
            touch.startY = t.clientY;
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!touch.active || isMenuOpen) return;
            const t = e.touches[0];
            touch.moveX = t.clientX - touch.startX;
            touch.moveY = t.clientY - touch.startY;
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            touch.active = false; touch.moveX = 0; touch.moveY = 0;
        });

        dashBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); touch.isDash = true;
            dashBtn.style.background = "rgba(74, 246, 38, 0.5)";
        }, {passive: false});

        dashBtn.addEventListener('touchend', () => {
            touch.isDash = false;
            dashBtn.style.background = "rgba(255, 255, 255, 0.2)";
        });

        function toggleMessage() {
            if (message !== "") message = ""; 
            else checkInteraction(); 
        }

        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');

        function checkCollision(x, y) {
            if (!mapImg.complete || offCanvas.width === 0) return { wall: false };
            const p = 2.0;
            const points = [{x: x+p, y: y+p}, {x: x+player.width-p, y: y+p}, {x: x+p, y: y+player.height-p}, {x: x+player.width-p, y: y+player.height-p}];
            for (let pt of points) {
                if (pt.x < 0 || pt.x >= mapImg.width || pt.y < 0 || pt.y >= mapImg.height) return { wall: true };
                const pixel = offCtx.getImageData(Math.floor(pt.x), Math.floor(pt.y), 1, 1).data;
                if (pixel[0] > 200 && pixel[1] > 200 && pixel[2] > 200) return { wall: true };
            }
            return { wall: false };
        }

        function checkInteraction() {
            const checkDist = 30;
            const centerX = player.x + player.width / 2;
            const centerY = player.y + player.height / 2;
            const dx = centerX - (item.x + item.size / 2);
            const dy = centerY - (item.y + item.size / 2);
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < checkDist + 15) { message = item.info; return; }
            
            // 壁（ドアなど）の調査
            const points = [{x: centerX, y: centerY-(player.height/2+checkDist)}, {x: centerX, y: centerY+(player.height/2+checkDist)}, {x: centerX-(player.width/2+checkDist), y: centerY}, {x: centerX+(player.width/2+checkDist), y: centerY}];
            for (let pt of points) {
                if (pt.x >= 0 && pt.x < mapImg.width && pt.y >= 0 && pt.y < mapImg.height) {
                    const pixel = offCtx.getImageData(Math.floor(pt.x), Math.floor(pt.y), 1, 1).data;
                    if (pixel[0] > 200 && pixel[1] > 200 && pixel[2] > 200) { message = "開かない"; return; }
                }
            }
        }

        function update() {
            if (gameState !== "playing" || isMenuOpen) return;

            let moveX = 0, moveY = 0;
            if (keys.w) moveY -= 1; if (keys.s) moveY += 1;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
            if (touch.active) {
                if (Math.abs(touch.moveX) > 10) moveX = touch.moveX > 0 ? 1 : -1;
                if (Math.abs(touch.moveY) > 10) moveY = touch.moveY > 0 ? 1 : -1;
            }

            const isMoving = moveX !== 0 || moveY !== 0;
            const isDashRequested = keys.shift || touch.isDash;

            if (player.isExhausted && player.stamina >= player.maxStamina / 3) player.isExhausted = false;

            if (isMoving && isDashRequested && player.stamina > 0 && !player.isExhausted) {
                player.isRunning = true; player.currentSpeed = player.dashSpeed;
                player.stamina -= 0.5; player.walkCycle += 0.25; player.barOpacity = 1.0;
                if (player.stamina <= 0) { player.stamina = 0; player.isExhausted = true; }
            } else if (isMoving) {
                player.isRunning = false; player.currentSpeed = player.baseSpeed;
                player.walkCycle += 0.15; if (player.stamina < player.maxStamina) player.stamina += 0.2;
            } else {
                player.isRunning = false; player.currentSpeed = player.baseSpeed;
                player.walkCycle = 0; if (player.stamina < player.maxStamina) player.stamina += 0.2;
            }

            if (player.stamina >= player.maxStamina) {
                player.stamina = player.maxStamina;
                if (player.barOpacity > 0) player.barOpacity -= 0.05;
            } else { player.barOpacity = 1.0; }

            if (moveX > 0) player.facingRight = true; else if (moveX < 0) player.facingRight = false;

            if (moveY !== 0) {
                const stepY = (moveY > 0 ? 1 : -1) * player.currentSpeed;
                if (!checkCollision(player.x, player.y + stepY).wall) player.y += stepY;
            }
            if (moveX !== 0) {
                const stepX = (moveX > 0 ? 1 : -1) * player.currentSpeed;
                if (!checkCollision(player.x + stepX, player.y).wall) player.x += stepX;
            }
        }

        function drawPlayer(ctx, x, y, width, height, color, facingRight, walkCycle) {
            ctx.save();
            ctx.translate(x + width / 2, y + height / 2);
            if (!facingRight) ctx.scale(-1, 1);
            ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round';
            const legAngle = Math.sin(walkCycle) * (width / 2);
            const armAngle = Math.sin(walkCycle) * (width / 4);
            ctx.beginPath(); ctx.arc(0, -height / 3.5, width / 3.5, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -height / 10); ctx.lineTo(0, height / 4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-width / 2.5 + armAngle, 0); ctx.lineTo(width / 2.5 - armAngle, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, height / 4); ctx.lineTo(legAngle, height / 2);
            ctx.moveTo(0, height / 4); ctx.lineTo(-legAngle, height / 2); ctx.stroke();
            ctx.restore();
        }

        function drawTitle() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white"; ctx.font = "bold 48px 'Segoe UI'"; ctx.textAlign = "center";
            ctx.fillText("The Game", canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = "24px 'Segoe UI'"; ctx.fillStyle = "#4AF626";
            ctx.fillText("TEST mode", canvas.width / 2, canvas.height / 2 + 20);
            titleFrame += 0.05;
            const opacity = (Math.sin(titleFrame) + 1) / 2;
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`; ctx.font = "20px 'Segoe UI'";
            ctx.fillText(isMobile ? "Please tap" : "Press any key", canvas.width / 2, canvas.height / 2 + 100);
        }

        function draw() {
            if (gameState === "title") {
                drawTitle();
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save(); 
                const camX = canvas.width / 2 - player.x - player.width / 2;
                const camY = canvas.height / 2 - player.y - player.height / 2;
                ctx.translate(camX, camY); 
                if (mapImg.complete) ctx.drawImage(mapImg, 0, 0);
                
                // 紙きれ描画
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = "white";
                ctx.fillRect(item.x, item.y, item.size, item.size * 1.2); ctx.shadowBlur = 0;
                
                drawPlayer(ctx, player.x, player.y, player.width, player.height, player.color, player.facingRight, player.walkCycle);
                
                if (player.barOpacity > 0) {
                    ctx.globalAlpha = player.barOpacity;
                    const barWidth = player.width * 1.2; const barHeight = 6; const barSpacing = 10;
                    const offsetX = (barWidth - player.width) / 2;
                    ctx.fillStyle = '#555'; ctx.fillRect(player.x - offsetX, player.y + player.height + barSpacing, barWidth, barHeight);
                    const staminaRatio = player.stamina / player.maxStamina;
                    ctx.fillStyle = player.isExhausted ? "#ff0000" : `rgb(255, ${Math.floor(255 * staminaRatio)}, 0)`;
                    ctx.fillRect(player.x - offsetX, player.y + player.height + barSpacing, staminaRatio * barWidth, barHeight);
                    ctx.globalAlpha = 1.0;
                }
                ctx.restore(); 
                
                if (message !== "") {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(50, canvas.height - 150, canvas.width - 100, 100);
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(50, canvas.height - 150, canvas.width - 100, 100);
                    ctx.fillStyle = "white"; ctx.font = "bold 18px 'Segoe UI', sans-serif";
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(message, canvas.width / 2, canvas.height - 100);
                }
            }
            requestAnimationFrame(() => { update(); draw(); });
        }

        mapImg.onload = () => {
            offCanvas.width = mapImg.width; offCanvas.height = mapImg.height;
            offCtx.drawImage(mapImg, 0, 0);
            resetPlayerPosition();
            item.x = mapImg.width * 0.75; item.y = mapImg.height / 2;
            draw(); 
        };
    </script>
</body>
</html>
