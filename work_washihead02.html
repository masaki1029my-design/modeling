<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>作品詳細</title>
  <link rel="stylesheet" href="css/works.css"><link rel="stylesheet" href="css/common.css"><style>
    /* --- 画像を横並び＋画面中央寄せにするスタイル --- */
    #concept {
      display: flex;           /* 横並びにする */
      flex-wrap: wrap;         /* 画面幅が狭いときは折り返す */
      justify-content: center; /* 【重要】横方向の中央寄せ */
      align-items: center;     /* 縦方向の中央寄せ */
      gap: 20px;               /* 画像と画像の間のすき間 */   
      margin: 0 auto;          /* 【重要】#concept 自体を画面中央に配置 */
    }
    #concept img {
      max-width: 100%;          /* 2枚が綺麗に中央で横並びになるサイズに微調整 */
      height: auto;            /* 縦横比を維持 */
      cursor: zoom-in;         /* クリックできることがわかるようにカーソルを虫眼鏡に */
    }

    /* 拡大表示（モーダル）用の追加スタイル */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: zoom-out;
    }
    .modal-overlay img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<script src="jquery.js"></script>
  <script>
$(function() {
  $('.slideshow-wrapper').each(function() {
    var $wrapper = $(this);
    var $slides = $wrapper.find('.slideshow img');
    var $number = $wrapper.find('.slide-number');
    var total = $slides.length;
    var current = 0;

    function show() {
      $slides.hide().eq(current).show();
      $number.text((current + 1) + ' / ' + total);
    }

    $wrapper.find('.prev-btn').on('click', function() {
      current = (current - 1 + total) % total;
      show();
    });

    $wrapper.find('.next-btn').on('click', function() {
      current = (current + 1) % total;
      show();
    });

    // 初期表示
    show();
  });

  // 拡大画像を表示するためのコンテナを本体（body）の最後に追加
  $('body').append('<div class="modal-overlay"><img src="" alt="拡大画像"></div>');

  // #concept 内の画像がクリックされた時の処理
  $('#concept img').on('click', function() {
    var imgSrc = $(this).attr('src'); // クリックされた画像のURLを取得
    $('.modal-overlay img').attr('src', imgSrc); // 拡大用コンテナに画像を設定
    $('.modal-overlay').fadeIn(200).css('display', 'flex'); // スムーズに表示
  });

  // 拡大画面（背景または画像）がクリックされたら閉じる処理
  $('.modal-overlay').on('click', function() {
    $(this).fadeOut(200);
  });
});
  </script>
<body>
  <p class="l1">【 鷲のヘッドフィギュア<span class="sub"> </span>】</p>
  <div id="concept">
  <p class="m">［　下地塗装　］</p>

    （個人的にはグレイカラーの方が造形が際立って見やすいと思います。）
    <img src="img/eagle_headmodel.png" alt="1">
  </div>
  <div id="concept">
  <p class="m">［　本塗装　］</p>
  本塗装に関する情報は、今月更新・投稿予定です。続報をお待ちください。

  </div>

</body>
</html>
